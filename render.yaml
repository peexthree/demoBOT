services:
- type: web
  name: eidos-webapp
  env: static
  buildCommand: cd webapp && npm install && npm run build
  staticPublishPath: webapp/dist
  envVars:
  - key: VITE_API_URL
    value: https://your-api-url
- type: web
  name: eidos-bot
  env: python
  buildCommand: pip install -r bot/requirements.txt
  startCommand: python bot/main.py
  healthCheckPath: /healthz
  envVars:
  - key: BOT_TOKEN
    sync: false
  - key: ADMIN_ID
    sync: false
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_KEY
    sync: false
  - key: WEBAPP_URL
    value: https://eidos-webapp.onrender.com
  - key: WEBHOOK_URL
    value: https://demobot-zs04.onrender.com
  - key: PORT
    sync: false
